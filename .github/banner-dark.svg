<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="100%" stop-color="#14142b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  </pattern>
  <rect width="800" height="200" rx="16" fill="url(#grid)"/>

  <!-- Glow -->
  <circle cx="150" cy="100" r="120" fill="#6366f1" opacity="0.08"/>

  <!-- Passionfruit icon (scaled up) -->
  <g transform="translate(80, 30) scale(4.2)">
    <ellipse cx="16" cy="18" rx="11" ry="10" fill="url(#accent)"/>
    <ellipse cx="13" cy="15" rx="5" ry="4" fill="#a5b4fc" opacity="0.3"/>
    <path d="M16 8 Q20 3 24 5 Q22 9 16 10 Z" fill="#4ade80"/>
    <line x1="16" y1="8" x2="16" y2="11" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="260" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f0f0f5" letter-spacing="-1">passionfruit</text>
  <text x="260" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#9ca3af" letter-spacing="0.5">Everyone can cook. Professional websites, powered by Claude Code.</text>
</svg>
