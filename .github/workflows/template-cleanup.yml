name: Template Cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    # Skip on the template repo itself — only run in derived repos
    if: github.repository != 'passion4it-gmbh/passionfruit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if cleanup already ran
        id: check
        run: |
          if [ ! -f release-please-config.json ] && [ ! -f .release-please-manifest.json ]; then
            echo "already-clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "already-clean=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove framework-only files
        if: steps.check.outputs.already-clean == 'false'
        run: |
          rm -f release-please-config.json
          rm -f .release-please-manifest.json
          rm -f .github/workflows/release.yml
          rm -f .github/workflows/template-cleanup.yml
          rm -f CHANGELOG.md

      - name: Commit cleanup
        if: steps.check.outputs.already-clean == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: remove passionfruit framework metadata

          Automated cleanup of release-please and template-cleanup files
          that only apply to the passionfruit template itself."
          git push
