name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm astro sync
      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
      - run: pnpm lint && pnpm lint:a11y

  spelling:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
      - run: pnpm check:spelling

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
      - run: pnpm typecheck

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
      - run: pnpm test

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .astro
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
      - run: pnpm build
      - run: pnpm check:links
