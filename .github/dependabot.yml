# Dependabot — automated dependency updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm / pnpm dependencies (Dependabot reads pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Bundle low-risk updates into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Major bumps stay as individual PRs for manual review (cutting-edge stack).

  # GitHub Actions used in the workflows (keeps @vX tags current)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
