<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Passionfruit icon (scaled up) -->
  <g transform="translate(80, 30) scale(4.2)">
    <ellipse cx="16" cy="18" rx="11" ry="10" fill="url(#accent)"/>
    <ellipse cx="13" cy="15" rx="5" ry="4" fill="#818cf8" opacity="0.4"/>
    <path d="M16 8 Q20 3 24 5 Q22 9 16 10 Z" fill="#4ade80"/>
    <line x1="16" y1="8" x2="16" y2="11" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="260" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#1e1b4b" letter-spacing="-1">passionfruit</text>
  <text x="260" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#6b7280" letter-spacing="0.5">Everyone can cook. Professional websites, powered by Claude Code.</text>
</svg>
